<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Management v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .management-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 30px;
        }
        
        .tab {
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            border-bottom-color: #667eea;
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .photo-upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .photo-upload-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }
        
        .photo-preview img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .file-label:hover {
            background: #5a6fd8;
        }
        
        .guests-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .guests-table th,
        .guests-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .guests-table th {
            background: #f8f9fa;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .tabs {
                flex-wrap: wrap;
            }
            
            .tab {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <h2>Login Admin</h2>
            <div id="loginMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>
    
    <div id="managementContainer" class="container" style="display: none;">
        <div class="management-container">
            <h1>Wedding Management v2</h1>
            
            <div class="tabs">
                <button class="tab active" onclick="showTab('photos')">📸 Foto</button>
                <button class="tab" onclick="showTab('guests')">👥 Tamu</button>
                <button class="tab" onclick="showTab('dashboard')">📊 Dashboard</button>
                <button class="tab" onclick="showTab('settings')">⚙️ Pengaturan</button>
                <button class="tab" onclick="logout()">🚪 Logout</button>
            </div>
            
            <div class="content">
                <div id="photos" class="tab-content active">
                    <h2>Manajemen Foto</h2>
                    <div id="photosMessage"></div>
                    
                    <div class="photo-upload-grid">
                        <div class="photo-upload-card">
                            <h3>Foto Mempelai Pria</h3>
                            <div class="photo-preview" id="groomPhotoPreview">
                                <span>👨</span>
                            </div>
                            <input type="file" id="groomPhoto" class="file-input" accept="image/*">
                            <label for="groomPhoto" class="file-label">Pilih Foto</label>
                        </div>
                        
                        <div class="photo-upload-card">
                            <h3>Foto Mempelai Wanita</h3>
                            <div class="photo-preview" id="bridePhotoPreview">
                                <span>👰</span>
                            </div>
                            <input type="file" id="bridePhoto" class="file-input" accept="image/*">
                            <label for="bridePhoto" class="file-label">Pilih Foto</label>
                        </div>
                        
                        <div class="photo-upload-card">
                            <h3>Foto Cover</h3>
                            <div class="photo-preview" id="coverPhotoPreview">
                                <span>🖼️</span>
                            </div>
                            <input type="file" id="coverPhoto" class="file-input" accept="image/*">
                            <label for="coverPhoto" class="file-label">Pilih Foto</label>
                        </div>
                    </div>
                </div>
                
                <div id="guests" class="tab-content">
                    <h2>Daftar Tamu</h2>
                    <div id="guestsMessage"></div>
                    
                    <table class="guests-table">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Nama</th>
                                <th>Ucapan</th>
                                <th>Kehadiran</th>
                            </tr>
                        </thead>
                        <tbody id="guestsTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="dashboard" class="tab-content">
                    <h2>Dashboard</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="totalGuests">0</div>
                            <div class="stat-label">Total Tamu</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-number" id="confirmedGuests">0</div>
                            <div class="stat-label">Konfirmasi Hadir</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-number" id="declinedGuests">0</div>
                            <div class="stat-label">Tidak Hadir</div>
                        </div>
                        
                        <div class="stat-card">
                            <div class="stat-number" id="pendingGuests">0</div>
                            <div class="stat-label">Belum Konfirmasi</div>
                        </div>
                    </div>
                </div>
                
                <div id="settings" class="tab-content">
                    <h2>Pengaturan</h2>
                    <div id="settingsMessage"></div>
                    
                    <form id="settingsForm">
                        <div class="form-group">
                            <label for="webAppUrl">Web App URL</label>
                            <input type="url" id="webAppUrl" name="webAppUrl" placeholder="https://script.google.com/macros/s/...">
                        </div>
                        
                        <div class="form-group">
                            <label for="adminPassword">Password Admin Baru</label>
                            <input type="password" id="adminPassword" name="adminPassword" placeholder="Kosongkan jika tidak ingin mengubah">
                        </div>
                        
                        <div class="form-group">
                            <label for="weddingDate">Tanggal Pernikahan</label>
                            <input type="datetime-local" id="weddingDate" name="weddingDate">
                        </div>
                        
                        <button type="submit" class="btn">Simpan Pengaturan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const CONFIG = {
            WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbznRPH4w_9rQSBGog69SPk6LEoAyS5krJ8Wx1t30Pai8opzl8gNNyZoAvUJRC2NgMGqSw/exec',
            ADMIN_PASSWORD: 'kawinkawin'
        };
        
        // Tab management
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked tab button
            event.target.classList.add('active');
            
            // Load data based on tab
            if (tabName === 'guests') {
                loadGuests();
            } else if (tabName === 'dashboard') {
                loadDashboard();
            } else if (tabName === 'photos') {
                loadPhotos();
            }
        }
        
        // Show message
        function showMessage(elementId, text, type) {
            const messageDiv = document.getElementById(elementId);
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 5000);
        }
        
        // Login handler
        function handleLogin(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            
            if (password === CONFIG.ADMIN_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('managementContainer').style.display = 'block';
                loadDashboard();
            } else {
                showMessage('loginMessage', 'Password salah!', 'error');
            }
        }
        
        // Logout handler
        function logout() {
            localStorage.removeItem('isLoggedIn');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('managementContainer').style.display = 'none';
        }
        
        // Check login status
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('managementContainer').style.display = 'block';
                loadDashboard();
            }
        }
        
        // Photo upload handlers
        function handlePhotoUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showMessage('photosMessage', 'Harap pilih file gambar!', 'error');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showMessage('photosMessage', 'Ukuran file terlalu besar! Max 5MB', 'error');
                return;
            }
            
            showMessage('photosMessage', 'Mengupload foto...', 'info');
            
            // Convert file to base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                
                // Create form data with base64
                const formData = new FormData();
                formData.append('action', 'uploadphoto');
                formData.append('type', type);
                formData.append('fileData', base64Data);
                formData.append('fileName', file.name);
                formData.append('mimeType', file.type);
                
                fetch(CONFIG.WEB_APP_URL, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        showMessage('photosMessage', 'Foto berhasil diupload!', 'success');
                        updatePhotoPreview(type, data.data.url);
                    } else {
                        showMessage('photosMessage', 'Error: ' + data.error, 'error');
                    }
                })
                .catch(error => {
                    showMessage('photosMessage', 'Error: ' + error.message, 'error');
                });
            };
            reader.readAsDataURL(file);
        }
        
        // Update photo preview
        function updatePhotoPreview(type, url) {
            const previewId = type + 'PhotoPreview';
            document.getElementById(previewId).innerHTML = `<img src="${url}" alt="${type}">`;
        }
        
        // Load photos
        function loadPhotos() {
            ['groom', 'bride', 'cover'].forEach(type => {
                fetch(`${CONFIG.WEB_APP_URL}?action=getphotourl&type=${type}`)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        updatePhotoPreview(type, data.data.url);
                    }
                })
                .catch(error => {
                    console.error('Error loading photo:', error);
                });
            });
        }
        
        // Load guests
        function loadGuests() {
            fetch(`${CONFIG.WEB_APP_URL}?action=getguests`)
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    displayGuests(data.data);
                } else {
                    showMessage('guestsMessage', 'Error: ' + data.error, 'error');
                }
            })
            .catch(error => {
                showMessage('guestsMessage', 'Error: ' + error.message, 'error');
            });
        }
        
        // Display guests
        function displayGuests(guests) {
            const tbody = document.getElementById('guestsTableBody');
            tbody.innerHTML = '';
            
            guests.forEach(guest => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = new Date(guest[0]).toLocaleString();
                row.insertCell(1).textContent = guest[1];
                row.insertCell(2).textContent = guest[2];
                row.insertCell(3).textContent = guest[3];
            });
        }
        
        // Load dashboard
        function loadDashboard() {
            fetch(`${CONFIG.WEB_APP_URL}?action=getguests`)
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    updateDashboardStats(data.data);
                }
            })
            .catch(error => {
                console.error('Error loading dashboard:', error);
            });
        }
        
        // Update dashboard stats
        function updateDashboardStats(guests) {
            const totalGuests = guests.length;
            const confirmedGuests = guests.filter(g => g[3] === 'hadir').length;
            const declinedGuests = guests.filter(g => g[3] === 'tidak hadir').length;
            const pendingGuests = totalGuests - confirmedGuests - declinedGuests;
            
            document.getElementById('totalGuests').textContent = totalGuests;
            document.getElementById('confirmedGuests').textContent = confirmedGuests;
            document.getElementById('declinedGuests').textContent = declinedGuests;
            document.getElementById('pendingGuests').textContent = pendingGuests;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Photo upload handlers
            document.getElementById('groomPhoto').addEventListener('change', (e) => handlePhotoUpload(e, 'groom'));
            document.getElementById('bridePhoto').addEventListener('change', (e) => handlePhotoUpload(e, 'bride'));
            document.getElementById('coverPhoto').addEventListener('change', (e) => handlePhotoUpload(e, 'cover'));
        });
    </script>
</body>
</html>
