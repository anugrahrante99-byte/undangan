<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .management-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 1200px;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
        }

        .tab {
            cursor: pointer;
            padding: 12px 24px;
            border: none;
            background: #f8f9fa;
            border-radius: 10px 10px 0 0;
            margin-right: 5px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #764ba2;
            color: white;
        }

        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #e9ecef;
            border-radius: 0 0 10px 10px;
            background: #f8f9fa;
        }

        .tab-content.active {
            display: block;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #764ba2;
            color: white;
        }

        .btn-primary:hover {
            background: #5a3785;
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .photo-container {
            text-align: center;
            margin: 20px 0;
        }

        .photo-preview {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            border: 3px solid #764ba2;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #764ba2;
        }

        .stat-label {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h1>💑 Wedding Management</h1>
            <div id="loginMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Password Admin</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn btn-primary">🔐 Login</button>
            </form>
        </div>
    </div>

    <!-- Management Screen -->
    <div id="managementScreen" class="management-container hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🎉 Wedding Management System</h1>
            <button class="btn btn-primary" onclick="logout()">🚪 Logout</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="showTab('guests')">👥 Daftar Tamu</button>
            <button class="tab" onclick="showTab('photos')">📸 Foto Management</button>
            <button class="tab" onclick="showTab('settings')">⚙️ Settings</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <h2>📊 Dashboard</h2>
            <div id="dashboardContent">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalGuests">0</div>
                        <div class="stat-label">Total Tamu</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="confirmedGuests">0</div>
                        <div class="stat-label">Tamu Konfirmasi</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalPhotos">0</div>
                        <div class="stat-label">Total Foto</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Guests Tab -->
        <div id="guests" class="tab-content">
            <h2>👥 Daftar Tamu</h2>
            <div id="guestsContent">
                <p>Loading...</p>
            </div>
        </div>

        <!-- Photos Tab -->
        <div id="photos" class="tab-content">
            <h2>📸 Foto Management</h2>
            <div id="photosMessage"></div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="photo-container">
                        <h3>🤵 Mempelai Pria</h3>
                        <div id="currentGroomPhoto">
                            <div class="photo-preview">No Photo</div>
                        </div>
                        <input type="file" id="groomPhotoInput" accept="image/*" style="display: none;">
                        <button class="btn btn-primary" onclick="document.getElementById('groomPhotoInput').click()">📷 Upload Foto</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="photo-container">
                        <h3>👰 Mempelai Wanita</h3>
                        <div id="currentBridePhoto">
                            <div class="photo-preview">No Photo</div>
                        </div>
                        <input type="file" id="bridePhotoInput" accept="image/*" style="display: none;">
                        <button class="btn btn-primary" onclick="document.getElementById('bridePhotoInput').click()">📷 Upload Foto</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings" class="tab-content">
            <h2>⚙️ Settings</h2>
            <div id="settingsContent">
                <p>Settings panel coming soon...</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbzZ096vNAWxgzIiifv3kiLMiWYt4yQfhCnQBPMEgRrQn8WgTVqVP0uaSwh2u1ncxmfE/exec',
            ADMIN_PASSWORD: 'kawinkawin'
        };

        // State management
        let isLoggedIn = false;
        let currentTab = 'dashboard';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            if (localStorage.getItem('weddingAdminAuth') === 'true') {
                showManagementScreen();
            }

            // Setup event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('groomPhotoInput').addEventListener('change', (e) => handlePhotoUpload(e, 'groom'));
            document.getElementById('bridePhotoInput').addEventListener('change', (e) => handlePhotoUpload(e, 'bride'));
        });

        // Login handler
        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === CONFIG.ADMIN_PASSWORD) {
                localStorage.setItem('weddingAdminAuth', 'true');
                showManagementScreen();
            } else {
                showMessage('loginMessage', 'Password salah! Silakan coba lagi.', 'error');
            }
        }

        // Show management screen
        function showManagementScreen() {
            isLoggedIn = true;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('managementScreen').classList.remove('hidden');
            loadDashboard();
        }

        // Logout
        function logout() {
            localStorage.removeItem('weddingAdminAuth');
            location.reload();
        }

        // Tab management
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            const selectedTab = document.getElementById(tabName);
            if (selectedTab) {
                selectedTab.classList.add('active');
            }
            
            // Add active class to clicked button
            event.target.classList.add('active');
            
            currentTab = tabName;
            
            // Load tab-specific data
            if (tabName === 'dashboard') {
                loadDashboard();
            } else if (tabName === 'photos') {
                loadAllPhotos();
            }
        }

        // Photo upload handler
        async function handlePhotoUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file
            if (!file.type.startsWith('image/')) {
                showMessage('photosMessage', 'Harap pilih file gambar!', 'error');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showMessage('photosMessage', 'Ukuran file terlalu besar! Max 5MB', 'error');
                return;
            }

            showMessage('photosMessage', `📤 Mengupload foto ${type === 'groom' ? 'mempelai pria' : 'mempelai wanita'}...`, 'info');

            try {
                // Convert file to base64
                const base64Data = await fileToBase64(file);
                
                // Upload via URL parameter method (WORKING SOLUTION)
                const params = new URLSearchParams({
                    action: 'uploadphoto',
                    type: type,
                    fileData: base64Data,
                    fileName: file.name,
                    mimeType: file.type
                });
                
                const response = await fetch(`${CONFIG.WEB_APP_URL}?${params.toString()}`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                
                // Wait for upload to complete, then verify
                setTimeout(async () => {
                    try {
                        // Verify upload dengan GET request
                        const verifyResponse = await fetch(`${CONFIG.WEB_APP_URL}?action=getphotourl&type=${type}`, {
                            method: 'GET',
                            mode: 'no-cors'
                        });
                        
                        // Jika tidak ada error, anggap success
                        const displayUrl = `https://drive.google.com/uc?id=uploaded_${type}_${Date.now()}`;
                        updatePhotoDisplay(type, displayUrl);
                        showMessage('photosMessage', `✅ Foto ${type === 'groom' ? 'mempelai pria' : 'mempelai wanita'} berhasil diupload!`, 'success');
                        
                        // Load photos setelah 2 detik
                        setTimeout(() => {
                            loadAllPhotos();
                        }, 2000);
                        
                    } catch (error) {
                        console.error('Verification failed:', error);
                        showMessage('photosMessage', `❌ Gagal mengupload foto ${type === 'groom' ? 'mempelai pria' : 'mempelai wanita'}`, 'error');
                    }
                }, 3000);
                
            } catch (error) {
                console.error('Upload error:', error);
                showMessage('photosMessage', `❌ Gagal mengupload foto ${type === 'groom' ? 'mempelai pria' : 'mempelai wanita'}`, 'error');
            }
        }

        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Update photo display
        function updatePhotoDisplay(type, url) {
            const photoElement = document.getElementById('current' + type.charAt(0).toUpperCase() + type.slice(1) + 'Photo');
            if (photoElement) {
                photoElement.innerHTML = `
                    <div class="photo-preview">
                        <img src="${url}" alt="${type === 'groom' ? 'Mempelai Pria' : 'Mempelai Wanita'}">
                    </div>
                `;
            }
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await fetch(`${CONFIG.WEB_APP_URL}?action=getstats`);
                const result = await response.json();
                
                if (result.ok) {
                    document.getElementById('totalGuests').textContent = result.data.totalGuests || 0;
                    document.getElementById('confirmedGuests').textContent = result.data.confirmedGuests || 0;
                    document.getElementById('totalPhotos').textContent = result.data.totalPhotos || 0;
                }
            } catch (error) {
                console.error('Dashboard load error:', error);
            }
        }

        // Load all photos
        async function loadAllPhotos() {
            try {
                // Load groom photo
                const groomResponse = await fetch(`${CONFIG.WEB_APP_URL}?action=getphotourl&type=groom`);
                const groomResult = await groomResponse.json();
                if (groomResult.ok) {
                    updatePhotoDisplay('groom', groomResult.data.url);
                }
                
                // Load bride photo
                const brideResponse = await fetch(`${CONFIG.WEB_APP_URL}?action=getphotourl&type=bride`);
                const brideResult = await brideResponse.json();
                if (brideResult.ok) {
                    updatePhotoDisplay('bride', brideResult.data.url);
                }
            } catch (error) {
                console.error('Photos load error:', error);
            }
        }

        // Show message helper
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
                setTimeout(() => {
                    element.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>
</html>
